name: green_banana
description: A banana ripeness detection app using AI + Computer Vision.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  google_mlkit_image_labeling: ^0.14.2   # Kent "Banana", "Fruit", "Yellow" etc.
  image: ^4.1.0                          # Kleuranalyse in Fase 4
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mobilenet_v1_1.0_224_quant.tflite
    - assets/labels.txt
